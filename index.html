<!DOCTYPE html>
<html>
  <head>
    <title>JavaScript Number Guessing Game</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
  
  </head>
  
    <body>
    <p id="date"></p>

    <h3 id = "level">Level</h3>
    <div class = "container">
    <input class = "aligned" type="radio" name="level" id="e" value="3" checked><label for="e">Easy</label>
    <input class = "aligned" type="radio" name="level" id="m" value="10"><label for="m">Medium</label>
    <input class = "aligned" type="radio" name="level" id="h" value="100"><label for="h">Hard</label>

    <button id="playBtn">Play</button>

    <h3 id="msg">Select a Level</h3>
    <input class = "aligned" type="text" id="guess">
    <button class = "aligned" id="guessBtn" disabled>Guess</button>
    <button class = "aligned" id="giveUpBtn" disabled>Give Up</button>

    <h3>Stats</h3>
    <p class = "aligned" id="wins">Total wins: 0</p>
    <p class = "aligned" id="avgScore">Average Score: </p>
    <p class = "aligned" id="fastest">Fastest Game: </p>
    <p class = "aligned" id="avgTime">Average Time: </p>

    <div class = "sidebar">
    <div class = "leaderboard">
    <h3>Leaderboard</h3>
    <ol>
      <li name="leaderboard">100</li>
      <li name="leaderboard">100</li>
      <li name="leaderboard">100</li>
    </ol>
    </div>
    </div>
  </body>
  </div>
</html>
